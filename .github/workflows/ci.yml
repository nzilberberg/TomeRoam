# Dev-side checks only. This runs on GitHub's servers when code is pushed; the
# app never contacts it and gains no runtime dependency on it. It exists to catch,
# before a deploy goes live, the mistakes that have actually bitten this repo:
# a failing test/lint slipping in, the build stamp drifting between files
# (stale index.html + fresh JS), and — via the mutation-sweep job — a guard going
# UNDEFENDED (a test that no longer fails when its target is broken). It needs no
# secrets and touches nothing outside the repo checkout.
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - run: npm ci
      - name: Build stamp is coherent (build.json is the source of truth)
        run: node tools/stamp-build.mjs --check
      - name: Lint
        run: npm run lint
      - name: Typecheck (no-build; // @ts-check files only)
        run: npm run typecheck
      - name: Tests (includes every gate — npm test runs test/*.test.js)
        run: npm test

  # The EXPENSIVE half of the mutation contract (Engineering Contract §4.10): npm test's
  # mutation-anchors gate proves each mutation still APPLIES; this proves each is still
  # CAUGHT — it runs the behavioural suite once per registered mutation and fails if any
  # mutation leaves the suite green (a guard nothing defends). Slow by nature (one full suite
  # per mutation), so it is its own job here, and SHARDED across parallel runners to keep
  # wall-clock ~2 min instead of ~13. Each shard computes its own slice from the live mutation
  # count (tools/mutation-sweep.mjs --shard=I/N), and the shards PARTITION the set — their
  # union is every mutation, so no guard is silently skipped as mutations are added. The whole
  # sweep is complete only when ALL shards pass; fail-fast is off so one failure shows them all.
  mutation-sweep:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - run: npm ci
      - name: Mutation shard ${{ matrix.shard }} of 8 is fully caught
        run: node tools/mutation-sweep.mjs --shard=${{ matrix.shard }}/8
